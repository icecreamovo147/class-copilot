name: release-build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  macos-arm64:
    name: macOS arm64 DMG
    runs-on: macos-14
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Resolve app version
        shell: bash
        run: echo "APP_VERSION=$(node -p \"require('./src-tauri/tauri.conf.json').version\")" >> "$GITHUB_ENV"

      - name: Build macOS arm64 app bundle
        run: npm run tauri build -- --bundles app --target aarch64-apple-darwin

      - name: Build macOS arm64 DMG without Finder automation
        shell: bash
        run: |
          ./scripts/build-macos-dmg.sh \
            "src-tauri/target/aarch64-apple-darwin/release/bundle/macos/数字化班级事务管理系统.app" \
            "src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/class-copilot_${APP_VERSION}_macos_aarch64.dmg"

      - name: Verify macOS arm64 install and uninstall flow
        run: ./scripts/verify-macos-install.sh "src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/class-copilot_${{ env.APP_VERSION }}_macos_aarch64.dmg"

      - name: Collect macOS arm64 checksums
        shell: bash
        run: |
          set -euo pipefail
          out="src-tauri/target/aarch64-apple-darwin/release/bundle"
          if [ ! -d "$out" ]; then
            echo "bundle directory not found" >&2
            exit 1
          fi
          find "$out" -type f \
            -name "*.dmg" \
            -print0 | sort -z | xargs -0 shasum -a 256 > "$out/SHA256SUMS.txt"

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles-macos-arm64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/SHA256SUMS.txt

  macos-x64:
    name: macOS x64 DMG
    runs-on: macos-13
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Resolve app version
        shell: bash
        run: echo "APP_VERSION=$(node -p \"require('./src-tauri/tauri.conf.json').version\")" >> "$GITHUB_ENV"

      - name: Build macOS x64 app bundle
        run: npm run tauri build -- --bundles app --target x86_64-apple-darwin

      - name: Build macOS x64 DMG without Finder automation
        shell: bash
        run: |
          ./scripts/build-macos-dmg.sh \
            "src-tauri/target/x86_64-apple-darwin/release/bundle/macos/数字化班级事务管理系统.app" \
            "src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/class-copilot_${APP_VERSION}_macos_x64.dmg"

      - name: Verify macOS x64 install and uninstall flow
        run: ./scripts/verify-macos-install.sh "src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/class-copilot_${{ env.APP_VERSION }}_macos_x64.dmg"

      - name: Collect macOS x64 checksums
        shell: bash
        run: |
          set -euo pipefail
          out="src-tauri/target/x86_64-apple-darwin/release/bundle"
          if [ ! -d "$out" ]; then
            echo "bundle directory not found" >&2
            exit 1
          fi
          find "$out" -type f \
            -name "*.dmg" \
            -print0 | sort -z | xargs -0 shasum -a 256 > "$out/SHA256SUMS.txt"

      - name: Upload macOS x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles-macos-x64
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/**/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/SHA256SUMS.txt

  windows-msi:
    name: Windows MSI
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Windows MSI bundle
        run: npm run tauri build -- --bundles msi --target x86_64-pc-windows-msvc

      - name: Verify Windows installer smoke flow
        shell: pwsh
        run: ./scripts/windows-smoke.ps1 "src-tauri/target/x86_64-pc-windows-msvc/release/bundle"

      - name: Collect Windows checksums
        shell: bash
        run: |
          set -euo pipefail
          out="src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
          if [ ! -d "$out" ]; then
            echo "bundle directory not found" >&2
            exit 1
          fi
          find "$out" -type f -name "*.msi" -print0 | sort -z | xargs -0 shasum -a 256 > "$out/SHA256SUMS.txt"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles-windows-msi
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/SHA256SUMS.txt

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - macos-arm64
      - macos-x64
      - windows-msi
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: bundles-macos-arm64
          path: release-assets/macos-arm64

      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: bundles-macos-x64
          path: release-assets/macos-x64

      - name: Download Windows MSI artifacts
        uses: actions/download-artifact@v4
        with:
          name: bundles-windows-msi
          path: release-assets/windows-msi

      - name: Publish tag assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/macos-arm64/**/*.dmg
            release-assets/macos-arm64/**/SHA256SUMS.txt
            release-assets/macos-x64/**/*.dmg
            release-assets/macos-x64/**/SHA256SUMS.txt
            release-assets/windows-msi/**/*.msi
            release-assets/windows-msi/**/SHA256SUMS.txt
